# Alembic configuration for VulnScan AI.
# The database URL is taken from the DATABASE_URL environment variable at
# runtime (see alembic/env.py); the value below is only a placeholder.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Overridden by DATABASE_URL env var in env.py.
sqlalchemy.url = postgresql+asyncpg://vulnscan:vulnscan@localhost:5432/vulnscan

[post_write_hooks]
# (none configured)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
